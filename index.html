        h1 { font-size: 28px; letter-spacing: 3px; margin-bottom: 10px; }
        .card-area { width: 380px; height: 608px; border: 3px solid #d4af37; margin: 15px auto; border-radius: 18px; background-color: #1a1a2e; display: flex; align-items: center; justify-content: center; font-size: 100px; position: relative; transition: 0.3s; overflow: hidden; box-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }
        .shuffling { animation: shuffle-shake 0.1s infinite; border-color: #fff; }
        @keyframes shuffle-shake { 0% { transform: translate(0,0); } 50% { transform: translate(-3px, 2px); } 100% { transform: translate(3px, -2px); } }
        .decided { animation: flash-effect 0.6s ease-out; }
        @keyframes flash-effect { 0% { filter: brightness(3); transform: scale(1.05); } 100% { filter: brightness(1); transform: scale(1); } }
        img { width: 100%; height: 100%; object-fit: cover; }
        button { background: linear-gradient(#d4af37, #aa8412); color: black; padding: 15px 45px; font-size: 22px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); margin-top: 10px; }
        button:hover { filter: brightness(1.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #name { font-size: 24px; margin: 15px 0 5px; }
        #desc { font-size: 18px; color: #eee; margin-top: 0; padding: 0 30px; min-height: 3em; line-height: 1.6; }

        let currentVoice = null;

        function uranau() {
            const display = document.getElementById('display');
            const btn = document.getElementById('btn');
            const nameText = document.getElementById('name');
            const descText = document.getElementById('desc');
            
            btn.disabled = true;
            nameText.innerText = "運命を占い中...";
            descText.innerText = "深呼吸してお待ちください...";
            
            // 抽選中も back.png を表示
            display.innerHTML = `<img src="back.png" onerror="this.parentElement.innerHTML='🃏'">`;
            display.classList.add('shuffling');

            if(currentVoice) { currentVoice.pause(); currentVoice.currentTime = 0; }
            soundBGM.pause(); soundBGM.currentTime = 0;
            soundRoll.currentTime = 0; soundRoll.play();

            setTimeout(() => {
                soundRoll.pause(); soundWin.currentTime = 0; soundWin.play();
                display.classList.remove('shuffling');
                display.classList.add('decided');

                const result = cards[Math.floor(Math.random() * cards.length)];
                display.innerHTML = `<img src="${result.id}.png" onerror="this.parentElement.innerHTML='🃏'">`;
                
                nameText.innerText = "✨ " + result.name + " ✨";
                descText.innerText = result.msg;

                setTimeout(() => {
                    currentVoice = new Audio(`voice/${result.id}.wav`);
                    currentVoice.play().catch(e => console.log("音声なし"));
                }, CONFIG.timing.voiceDelay);

                setTimeout(() => { soundBGM.play(); }, CONFIG.timing.bgmDelay);
                
                setTimeout(() => { display.classList.remove('decided'); btn.disabled = false; }, 1000);
            }, CONFIG.timing.shuffleDuration); 
        }

        // --- 振動検知機能 ---
        const specialCard = { name: "運命の裏側", img: "back.png", msg: "特別な力が働いています。" };
        const SHAKE_THRESHOLD = 15;
        let lastX, lastY, lastZ;

        window.addEventListener('devicemotion', (event) => {
            const acc = event.accelerationIncludingGravity;
            if (!acc.x || !acc.y || !acc.z) return;
            if (lastX !== undefined) {
                let delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
                if (delta > SHAKE_THRESHOLD && !document.getElementById('btn').disabled) {
                    showSpecialCard();
                }
            }
            lastX = acc.x; lastY = acc.y; lastZ = acc.z;
        });

        function showSpecialCard() {
            const display = document.getElementById('display');
            const nameText = document.getElementById('name');
            const descText = document.getElementById('desc');
            display.classList.add('decided');
            display.innerHTML = `<img src="${specialCard.img}" onerror="this.parentElement.innerHTML='🃏'">`;
            nameText.innerText = "✨ " + specialCard.name + " ✨";
            descText.innerText = specialCard.msg;
            setTimeout(() => { display.classList.remove('decided'); }, CONFIG.timing.specialReset);
        }
    </script>
